services:
  - type: web
    name: crm-automation-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome && npm run build
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: PORT
        value: 3001
    healthCheckPath: /api/health
    autoDeploy: true
